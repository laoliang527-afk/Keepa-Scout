services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: keepa_scout_api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      DB_PATH: /app/data/scout.db
    restart: unless-stopped
    command: >
      sh -c "
        python -m app.etl &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000
      "

volumes:
  data:
